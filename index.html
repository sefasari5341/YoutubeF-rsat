<!DOCTYPE html>
<html>
<head>
  <title>Ozillo Style Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#0f0f0f;
      color:white;
    }

    .hero {
      height:90vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      animation:fadeIn 1.4s ease-in-out;
    }

    .hero h1 {
      font-size:70px;
      font-weight:900;
      margin:0;
    }

    .hero p {
      font-size:24px;
      opacity:0.7;
    }

    .btn {
      margin-top:30px;
      padding:18px 48px;
      background:#ff0044;
      border:none;
      color:white;
      font-size:20px;
      cursor:pointer;
      border-radius:6px;
      transition:0.3s;
    }
    .btn:hover {
      transform: scale(1.04);
      background:#d3003a;
    }

    .section {
      padding:80px 40px;
    }

    .cards {
      display:flex;
      gap:30px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .card {
      background:#1c1c1c;
      padding:30px;
      width:260px;
      border-radius:10px;
      transition:0.4s;
    }
    .card:hover {
      transform: translateY(-10px);
      background:#262626;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(30px);}
      to {opacity:1; transform:translateY(0);}
    }

  </style>
</head>
<body>

<div class="hero">
  <h1>Ozillo Style Site</h1>
  <p>Modern, temiz, etkileyici ilk sayfa.</p>
  <button class="btn">Keşfet</button>
</div>

<div class="section">
  <h2 style="text-align:center;">Neden Biz?</h2>
  <div class="cards">
    <div class="card">Hızlı</div>
    <div class="card">Modern</div>
    <div class="card">Minimal</div>
  </div>
</div>

</body>
</html>

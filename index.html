<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Fırsat</title>
<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
padding:20px 40px;
display:flex;
justify-content:space-between;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
margin:0;
}

.btn{
margin-top:30px;
padding:15px 35px;
background:red;
border:none;
color:white;
cursor:pointer;
}

.section{
padding:100px 40px;
background:#111;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:#2a2a2a;
}

</style>
</head>

<body>

<header>
<div>YouTube Fırsat</div>
</header>

<div class="hero">
<h1>Fırsatları Keşfet</h1>
<button class="btn" onclick="document.getElementById('kanallar').scrollIntoView({behavior:'smooth'})">
Başla
</button>
</div>

<div class="section" id="kanallar">
<h2>Fırsat Kanalları</h2>
<div class="grid">

<div class="card" onclick="window.open('https://youtube.com','_blank')">
<h3>AI Fırsat Kanalı</h3>
<p>Yapay zeka trend analizleri</p>
</div>

<div class="card" onclick="window.open('https://youtube.com','_blank')">
<h3>Crypto Radar</h3>
<p>Yeni coin fırsatları</p>
</div>

<div class="card" onclick="window.open('https://youtube.com','_blank')">
<h3>Faceless Growth</h3>
<p>Yüzsüz kanal fikirleri</p>
</div>

</div>
</div>

</body>
</html>
